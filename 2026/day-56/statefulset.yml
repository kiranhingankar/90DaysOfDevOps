apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: statefulset-web

spec:
  serviceName: nginx-headless
  replicas: 3

  selector:
    matchLabels:
      app: nginx-stateful

  template:
    metadata:
      labels:
        app: nginx-stateful

    spec:
      containers:
        - name: nginx-pod
          image: nginx

          ports:
          - containerPort: 80
            name: web

          volumeMounts:
          - name: web-data
            mountPath: /usr/share/nginx/html

  volumeClaimTemplates:
  - metadata:
      name: web-data

    spec:
      accessModes:
        - ReadWriteOnce

      resources:
        requests:
          storage: 100Mi